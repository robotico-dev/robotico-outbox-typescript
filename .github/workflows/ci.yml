name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NUGET_API_KEY || secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://npm.pkg.github.com
          scope: "@robotico-dev"
          cache: npm
      - name: Authenticate npm with GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:coverage
      - run: npm run docs
